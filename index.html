<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gurukul Canteen Record</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Gurukul Canteen Record</h1>
      <button id="theme-switch">🌙</button>
    </header>
    
    <section class="filters">
      <input type="text" id="student-name" placeholder="Search by Student Name" autocomplete="off">
      <input type="date" id="start-date">
      <input type="date" id="end-date">
      <select id="transaction-type">
        <option value="All">All Transactions</option>
        <option value="Debit">Debit</option>
        <option value="Credit">Credit</option>
      </select>
      <button id="search-btn">Search</button>
    </section>

    <div id="loading" class="spinner"></div>
    <section id="transactions">
      <table id="transactions-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Debit Amount</th>
            <th>Credit Amount</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="pagination"></div>
    </section>

    <footer>
      <div id="total-balance">Total Balance: ₹0</div>
      <button id="download-pdf">Download PDF</button>
      <button id="share-whatsapp">Share via WhatsApp</button>
    </footer>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
